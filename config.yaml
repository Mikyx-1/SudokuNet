# ── Sudoku Solver Training Configuration ─────────────────────────────────────

data:
  num_samples: 50000
  min_mask: 1
  max_mask: 64
  num_workers: 16

model:
  embed_dim: 64
  channels: 256
  num_res_blocks: 8
  num_heads: 8
  dropout_rate: 0.1

training:
  batch_size: 128
  lr: 3.0e-4
  weight_decay: 1.0e-4
  num_epochs: 200
  grad_clip: 1.0

schedule:
  warmup_epochs: 5
  lr_min: 1.0e-6

logging:
  log_every: 10     # steps between scalar logs
  eval_every: 1     # epochs between evaluations
  save_every: 5     # epochs between checkpoints
  run_name: null    # auto-generated if null
  output_dir: runs
  use_wandb: false

resume:
  resume_from: null # path to a checkpoint .pt file