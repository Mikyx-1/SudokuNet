# ── Sudoku Solver Training Configuration ─────────────────────────────────────

data:
  num_samples: 50000
  min_mask: 1
  max_mask: 64
  num_workers: 16

model:
  embed_dim: 64
  channels: 256
  num_res_blocks: 8
  num_heads: 8
  dropout_rate: 0.1

training:
  batch_size: 128
  lr: 3.0e-4
  weight_decay: 1.0e-4
  num_epochs: 3000
  grad_clip: 1.0
  label_smoothing: 0.1
  use_amp: true
  curriculum: true
  curriculum_start_mask: 20
  curriculum_ramp_frac: 0.02

schedule:
  warmup_epochs: 5
  lr_min: 1.0e-6

logging:
  log_every: 10     # steps between scalar logs
  eval_every: 1     # epochs between evaluations
  save_every: 5     # epochs between checkpoints
  output_dir: runs

wandb:
  use_wandb: true
  project: "sudoku-solver"
  group: sudoku_cnn
  run_name: null    # auto-generates to "{group}_{timestamp}" e.g. "sudoku_cnn_20250502_143022"

resume:
  resume_from: null # path to a checkpoint .pt file